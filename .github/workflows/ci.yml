name: Marketing Site — E2E + Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run full suite every day at 06:00 UTC (catches drift, broken links)
    - cron: "0 6 * * *"

jobs:
  # ── 1. PLAYWRIGHT E2E ────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: npx playwright test
        env:
          MARKETING_URL: https://primecoreintelligence.com
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: test-results/
          retention-days: 14

  # ── 2. LINK CHECKER ──────────────────────────────────────────────────────
  links:
    name: Broken Link Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check for dead links in HTML files
        run: |
          # Check for placeholder phone numbers
          if grep -r "15551234567" public/ --include="*.html"; then
            echo "❌ FAIL: Placeholder WhatsApp number found"
            exit 1
          fi

          # Check for dead PDF links
          if grep -r "PrimeCore_LATAM_Enterprise_Pack.*\.pdf" public/ --include="*.html"; then
            echo "❌ FAIL: Dead PDF link found"
            exit 1
          fi

          # Check for TODO/placeholder text
          if grep -ri "TODO\|PLACEHOLDER\|INSERT_HERE\|lorem ipsum" public/ --include="*.html"; then
            echo "❌ FAIL: Placeholder content found"
            exit 1
          fi

          echo "✅ No broken links or placeholders found"

  # ── 3. SECURITY SCAN ─────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Scan for leaked secrets
        run: |
          # Check for API keys in HTML/JS
          if grep -r "re_[a-zA-Z0-9]\{20,\}" public/ --include="*.html" --include="*.js"; then
            echo "❌ FAIL: Possible Resend API key in public files"
            exit 1
          fi
          if grep -r "ghp_[a-zA-Z0-9]\{20,\}" public/ --include="*.html" --include="*.js"; then
            echo "❌ FAIL: GitHub PAT found in public files"
            exit 1
          fi
          if grep -r "cfut_[a-zA-Z0-9]\{20,\}" public/ --include="*.html" --include="*.js"; then
            echo "❌ FAIL: Cloudflare token found in public files"
            exit 1
          fi
          echo "✅ No secrets found in public files"

      - name: Check CSP headers file
        run: |
          if [ ! -f "public/_headers" ]; then
            echo "⚠️  WARNING: No _headers file found"
          else
            echo "✅ _headers file present"
            cat public/_headers
          fi

  # ── 4. CONTENT QUALITY ───────────────────────────────────────────────────
  content:
    name: Content Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check multilingual parity
        run: |
          EN_SECTIONS=$(grep -c "^<section" public/index.html || echo 0)
          ES_SECTIONS=$(grep -c "^<section" public/es/index.html || echo 0)
          PT_SECTIONS=$(grep -c "^<section" public/pt-br/index.html || echo 0)

          echo "EN sections: $EN_SECTIONS"
          echo "ES sections: $ES_SECTIONS"
          echo "PT sections: $PT_SECTIONS"

          # ES and PT should have at least 6 sections
          if [ "$ES_SECTIONS" -lt 6 ]; then
            echo "❌ FAIL: ES page has fewer than 6 sections"
            exit 1
          fi
          if [ "$PT_SECTIONS" -lt 6 ]; then
            echo "❌ FAIL: PT page has fewer than 6 sections"
            exit 1
          fi
          echo "✅ Multilingual section parity OK"

      - name: Check setLang is defined in all pages
        run: |
          for f in public/index.html public/es/index.html public/pt-br/index.html; do
            if ! grep -q "window.setLang\|function setLang" "$f"; then
              echo "❌ FAIL: setLang missing in $f"
              exit 1
            fi
          done
          echo "✅ setLang defined in all language pages"

      - name: Check geographic references removed from footer
        run: |
          if grep -i "Guatemala City\|Ciudad de Guatemala\|dual operations\|operaciones duales" \
               public/index.html public/es/index.html public/pt-br/index.html; then
            echo "❌ FAIL: Geographic reference found in footer"
            exit 1
          fi
          echo "✅ No geographic references in footers"

      - name: Check holding company text present
        run: |
          if ! grep -q "holding company\|sociedad holding\|uma holding" \
               public/index.html public/es/index.html public/pt-br/index.html; then
            echo "❌ FAIL: Holding company text missing from one or more pages"
            exit 1
          fi
          echo "✅ Holding company text present"

  # ── 5. NOTIFY ON FAILURE ─────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [e2e, links, security, content]
    if: failure()

    steps:
      - name: Log failure summary
        run: |
          echo "❌ CI FAILED on commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Author: ${{ github.actor }}"
          echo "Check the Actions tab for details."
